version: '3.8'

services:
  takeoff:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/prisma/dev.db
    volumes:
      - takeoff-data:/app/prisma
    restart: always

volumes:
  takeoff-data:
